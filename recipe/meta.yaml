{% set name = "omegaconf" %}
{% set version = "2.3.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: e5e7de64aeebeddaf8e6d3f7a783b32ac2a01c0fbd9c878012caecb891a1f42a

build:
  number: 0
  # skip s390x because openjdk is not available
  skip: true  # [s390x]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  skip: true  # [py<36]

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
    # setup.py BuildPyCommand calls ANTLRCommand which runs the bundled
    # antlr-4.9.3-complete.jar via java to regenerate grammar/gen/*.py
    - openjdk
  run:
    - python
    - pyyaml >=5.1.0
    - antlr4-python3-runtime 4.9

test:
  imports:
    - omegaconf
  source_files:
    - tests
  commands:
    - pip check
    # pytest-benchmark 5.2.3 uses removed py.io API on py3.14; -p no:benchmark disables the plugin
    # node33/path_to_float/path_value/test_type_str+pathlib: pathlib hash/serialization changed in py3.12+
    - pytest --ignore tests/test_pydev_resolver_plugin.py -p no:benchmark
        -k "not (node33 or path_to_float or (test_to_yaml and path_value) or (test_type_str and pathlib) or test_resolver_error)"
  requires:
    - pip
    - pytest <8  # tests use _pytest.python_api.RaisesContext, removed in pytest 8
    - pytest-mock
    - attrs

about:
  home: https://github.com/omry/omegaconf
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Flexible python configuration system
  description: |
    OmegaConf is a hierarchical configuration system, with support for merging
    configurations from multiple sources (YAML config files,
    dataclasses/objects and CLI arguments) providing a consistent API
    regardless of how the configuration was created.
  doc_url: https://omegaconf.readthedocs.io/
  dev_url: https://github.com/omry/omegaconf

extra:
  recipe-maintainers:
    - maresb
    - mdraw
    - omry
    - benjaminrwilson
